name: development
seed: 0
model:
  architecture: transformer
  block_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 256
  memory:
    n_pass: 4
data:
  train_file: data/countdown/train1_b4_t100_n100000.txt
  val_file: data/countdown/val1_b4_t100_n100000.txt
  generalization_file: data/countdown/val_target1_b4_t100_n100000.txt
  countdown_max_intermediate: 10000
  countdown_input_numbers: 4
  countdown_num_equations: 3
  num_pause_tokens: 8
objective:
  transition: none
  lambda_transition: 1.0
  lambda_kl: 1.0
  projection_factor: 1.3
training:
  train_steps: 10000
  micro_batch_size: 16
  gradient_accumulation_steps: 4
  eval_interval: 1000
  eval_batches: 20
  log_interval: 20
  checkpoint_interval: 1000
  device: auto
  precision: float32
  compile: false
evaluation:
  generation_prompts: 8
  accuracy_batches: null
  training_accuracy_interval: 1000
  training_accuracy_batches: 4
  diagnostic_batches: 8
  checkpoint_metric: final_pass_nll
  checkpoint_mode: min
