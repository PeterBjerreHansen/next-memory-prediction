name: smoke
seed: 0
model:
  variant: transformer_ntp
  block_size: 64
  n_layer: 2
  n_head: 2
  n_embd: 64
  memory:
    n_pass: 2
data:
  source: generated
  countdown_max_intermediate: 10000
  countdown_min_target: 10
  countdown_max_target: 100
  countdown_input_numbers: 4
  countdown_num_equations: 3
  num_pause_tokens: 8
  train_samples: 64
  val_samples: 16
  generalization_samples: 16
  split_seed: 444
objective:
  transition:
    horizon: 1
    target: null
    lambda_transition: 1.0
    lambda_kl: 1.0
    lambda_ce: 0.0
    projection_factor: 1.3
training:
  train_steps: 10
  micro_batch_size: 2
  gradient_accumulation_steps: 1
  eval_interval: 5
  eval_batches: 2
  log_interval: 1
  checkpoint_interval: 5
  device: auto
  precision: float32
  compile: false
evaluation:
  generation_prompts: 2
  accuracy_batches: null
  diagnostic_batches: 2
  probe_steps: 10
  probe_batch_size: 2
  probe_offsets: [1, 2, 4, 8, 16, 20]
  checkpoint_metric: final_pass_nll
  checkpoint_mode: min
