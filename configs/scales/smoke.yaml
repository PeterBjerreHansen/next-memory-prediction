name: smoke
seed: 0
model:
  architecture: transformer
  block_size: 64
  n_layer: 2
  n_head: 2
  n_embd: 64
  memory:
    n_pass: 2
data:
  train_file: tests/fixtures/countdown_train.txt
  val_file: tests/fixtures/countdown_val.txt
  generalization_file: tests/fixtures/countdown_generalization.txt
  countdown_max_intermediate: 10000
  countdown_input_numbers: 4
  countdown_num_equations: 3
  num_pause_tokens: 8
objective:
  transition: none
  lambda_transition: 1.0
  lambda_kl: 1.0
  projection_factor: 1.3
training:
  train_steps: 10
  micro_batch_size: 2
  gradient_accumulation_steps: 1
  eval_interval: 5
  eval_batches: 2
  log_interval: 1
  checkpoint_interval: 5
  device: auto
  precision: float32
  compile: false
evaluation:
  generation_prompts: 2
  accuracy_batches: null
  training_accuracy_interval: 5
  training_accuracy_batches: 1
  diagnostic_batches: 2
  checkpoint_metric: final_pass_nll
  checkpoint_mode: min
