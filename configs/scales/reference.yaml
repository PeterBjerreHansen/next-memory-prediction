name: reference
seed: 0
model:
  architecture: transformer
  block_size: 256
  n_layer: 8
  n_head: 8
  n_embd: 768
  memory:
    n_pass: 4
data:
  train_file: data/countdown/train1_b4_t100_n500000.txt
  val_file: data/countdown/val1_b4_t100_n500000.txt
  generalization_file: data/countdown/val_target1_b4_t100_n500000.txt
  countdown_max_intermediate: 10000
  countdown_input_numbers: 4
  countdown_num_equations: 3
  num_pause_tokens: 8
objective:
  transition: none
  lambda_transition: 1.0
  lambda_kl: 1.0
  projection_factor: 1.3
training:
  train_steps: 100000
  micro_batch_size: 32
  gradient_accumulation_steps: 8
  eval_interval: 1000
  eval_batches: 100
  log_interval: 10
  checkpoint_interval: 1000
  device: auto
  precision: bfloat16
  compile: true
evaluation:
  generation_prompts: 16
  accuracy_batches: null
  diagnostic_batches: 20
  checkpoint_metric: final_pass_nll
  checkpoint_mode: min
