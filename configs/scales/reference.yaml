name: reference
seed: 0
model:
  variant: transformer_ntp
  block_size: 256
  n_layer: 8
  n_head: 8
  n_embd: 768
  memory:
    n_pass: 4
data:
  source: generated
  countdown_max_intermediate: 10000
  countdown_min_target: 10
  countdown_max_target: 100
  countdown_input_numbers: 4
  countdown_num_equations: 3
  num_pause_tokens: 8
  train_samples: 500000
  val_samples: 10000
  generalization_samples: 10000
  split_seed: 444
objective:
  transition:
    horizon: 1
    target: null
    lambda_transition: 1.0
    lambda_kl: 1.0
    lambda_ce: 0.0
    projection_factor: 1.3
training:
  train_steps: 100000
  micro_batch_size: 32
  gradient_accumulation_steps: 8
  eval_interval: 1000
  eval_batches: 100
  log_interval: 10
  checkpoint_interval: 1000
  device: auto
  precision: bfloat16
  compile: true
evaluation:
  generation_prompts: 16
  prompt_tokens: 32
  generation_tokens: 17
  diagnostic_batches: 20
  probe_steps: 20000
  probe_batch_size: 256
  checkpoint_metric: val_accuracy
  checkpoint_mode: max
