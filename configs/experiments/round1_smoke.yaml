name: round1_smoke
base_config: configs/scales/smoke.yaml
runs_root: runs

selection:
  metric: final_pass_nll
  mode: min
  select_lambda_per_variant: true

shared_overrides:
  objective:
    ntp_pass_weights: [0.0, 1.0]

seeds: [0]

conditions:
  - name: transformer_ntp
    architecture: transformer
    transition: none
    lambda_transition: null

  - name: memory_tape_ntp
    architecture: memory_tape
    transition: none
    lambda_transition: null

  - name: memory_tape_nmp
    architecture: memory_tape
    transition: memory
    lambda_transition: [1.0]

  - name: memory_tape_hidden_transition
    architecture: memory_tape
    transition: hidden
    lambda_transition: [1.0]

  - name: memory_tape_hidden_transition_kl
    architecture: memory_tape
    transition: hidden_kl
    lambda_transition: [1.0]

post_run:
  evaluate: true
  plot: true
  summarize: true
